<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abdulhay Avazxanov | Portfolio</title>
    <meta name="description" content="Abdulhay Avazxanov - IT, Robototexnika va Veb-muhandis portfoliosi." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              glass: "rgba(255, 255, 255, 0.05)",
              glassBorder: "rgba(255, 255, 255, 0.1)",
              primary: "#3b82f6",
              secondary: "#8b5cf6",
            },
            animation: {
              'blob': 'blob 7s infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shimmer: {
                from: { backgroundPosition: '0 0' },
                to: { backgroundPosition: '-200% 0' },
              },
            }
          },
        },
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
      }
      
      body {
        /* Base light color with a tint */
        background-color: #f0f9ff;
        color: #0f172a;
        overflow-x: hidden;
        position: relative;
        min-height: 100vh;
      }

      /* Dynamic Liquid Background Elements */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }

      /* Liquid Orbs in Background */
      .bg-orb-1, .bg-orb-2, .bg-orb-3 {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        opacity: 0.5;
        animation: blob 15s infinite alternate;
      }
      .bg-orb-1 { top: 10%; left: 10%; width: 50vw; height: 50vw; background: rgba(56, 189, 248, 0.5); }
      .bg-orb-2 { bottom: 10%; right: 10%; width: 40vw; height: 40vw; background: rgba(244, 114, 182, 0.4); animation-delay: -5s; }
      .bg-orb-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 40vw; background: rgba(232, 121, 249, 0.3); animation-delay: -10s; }
      
      /* Custom Scrollbar for Premium Feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f0f9ff; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(15, 23, 42, 0.1); 
        border-radius: 10px;
        backdrop-filter: blur(10px);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(15, 23, 42, 0.3); 
      }

      /* Core Liquid Glass Class for Light Theme */
      .glass-card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        border-right: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%);
        box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.5);
      }
      
      .glass-nav {
        background: rgba(255, 255, 255, 0.3); 
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      }
      
      .text-glow {
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      }
      
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

  </body>
</html>
